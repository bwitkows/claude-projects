<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicle Driving Simulator</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
        font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      #fps {
        position: fixed;
        top: 8px;
        right: 8px;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fps">FPS: 0</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
