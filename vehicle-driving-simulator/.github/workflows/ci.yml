# NOTE: The user instruction for this rung was to put everything under
# `vehicle-driving-simulator/`. The git repository root is one level above
# (a parent monorepo of OpenSpec changes), so for GitHub Actions to actually
# pick this workflow up it needs to live at the parent's `.github/workflows/`.
# Path references below are written for the parent-repo location so the file
# can be hoisted without edits.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: vehicle-driving-simulator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vehicle-driving-simulator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: vehicle-driving-simulator/playwright-report
          retention-days: 7
