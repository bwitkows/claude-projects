name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment but let the in-progress one finish so
# we don't drop a half-rolled artifact.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vehicle-driving-simulator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vehicle-driving-simulator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (with Pages base path)
        # Pages serves project sites at https://<user>.github.io/<repo>/, so
        # vite needs `--base=/<repo>/` to rewrite asset URLs.
        run: npm run build -- --base=/claude-projects/

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # path is resolved from GITHUB_WORKSPACE, not from working-directory.
          path: vehicle-driving-simulator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
